name: Deploy Worker
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with Wrangler
        env:
          CF_KEY: ${{ secrets.CF_API_TOKEN }}
          CF_EMAIL: ${{ secrets.CF_EMAIL }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -e
          echo "Key length: ${#CF_KEY}"
          echo "Email: ${CF_EMAIL}"
          echo "=== Verify with Global API Key ==="
          curl -sf https://api.cloudflare.com/client/v4/user \
            -H "X-Auth-Email: ${CF_EMAIL}" \
            -H "X-Auth-Key: ${CF_KEY}"
          echo ""
          echo "=== Deploy with wrangler ==="
          npm install -g wrangler 2>&1 | tail -3
          cd worker
          CLOUDFLARE_API_KEY=${CF_KEY} CLOUDFLARE_EMAIL=${CF_EMAIL} CLOUDFLARE_ACCOUNT_ID=${CF_ACCOUNT} \
            wrangler deploy _worker.js --name vless-worker-2026 --compatibility-date 2023-10-30 --no-bundle 2>&1
