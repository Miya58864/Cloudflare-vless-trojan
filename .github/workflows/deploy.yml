name: Deploy Worker
on:
  push:
    branches: [main]
  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy with Wrangler
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -e
          echo Token length: ${#CF_TOKEN}
          echo Account ID length: ${#CF_ACCOUNT}
          echo === Verify token ===
          curl -sf https://api.cloudflare.com/client/v4/user/tokens/verify -H "Authorization: Bearer ${CF_TOKEN}"
          echo ''
          echo === List workers test ===
          L=$(curl -s -o /tmp/l.json -w "%{http_code}" https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts -H "Authorization: Bearer ${CF_TOKEN}")
          echo List HTTP: $L
          cat /tmp/l.json
          echo === Deploy with wrangler ===
          npm install -g wrangler 2>&1 | tail -3
          cd worker
          CLOUDFLARE_API_TOKEN=${CF_TOKEN} CLOUDFLARE_ACCOUNT_ID=${CF_ACCOUNT} wrangler deploy _worker.js --name vless-worker-2026 --compatibility-date 2023-10-30 --no-bundle 2>&1
